worker_processes 1;

include modules.d/*.conf;

events {
  worker_connections 1024;
}

http {
  include mime.types;
  default_type application/octet-stream;

  sendfile on;
  keepalive_timeout 65;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript image/svg+xml;

  server {
    listen 80 default_server;
    server_name localhost _;

    root /home/n0rv/website;
    index index.html;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://challenges.cloudflare.com; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    location /api/ {
      proxy_pass http://127.0.0.1:3000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin.html {
      auth_basic "Admin";
      auth_basic_user_file /etc/nginx/.htpasswd;
      try_files /admin.html =404;
    }

    location ~ (^/\.|^/(server\.js|package.*|README\.md|ecosystem\.config\.cjs|u_and_u_movers_logo\.svg)$|^/(data|node_modules|scripts|deploy|backups|logs)/) {
      return 404;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|webp|svg|ico)$ {
      expires 7d;
      add_header Cache-Control "public, max-age=604800, must-revalidate";
      try_files $uri =404;
    }

    location = / {
      try_files /index.html =404;
    }

    location ~ ^/(index|services|faq|privacy|terms)\.html$ {
      try_files $uri =404;
    }

    location / {
      return 404;
    }
  }
}
